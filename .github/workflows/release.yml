name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
      publish_release:
        description: Create or update the GitHub release
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Select Xcode 16.2
        shell: bash
        run: |
          echo "DEVELOPER_DIR=/Applications/Xcode_16.2.app/Contents/Developer" >> "$GITHUB_ENV"
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG_NAME="${GITHUB_REF_NAME}"
            SHOULD_PUBLISH="true"
          else
            VERSION="${{ inputs.version }}"
            TAG_NAME="v${VERSION}"
            SHOULD_PUBLISH="${{ inputs.publish_release }}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        env:
          DEVMAID_SIGNING_IDENTITY: ${{ secrets.DEVMAID_SIGNING_IDENTITY }}
          DEVMAID_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.DEVMAID_NOTARY_KEYCHAIN_PROFILE }}
        run: ./scripts/build_release.sh "${{ steps.version.outputs.version }}"

      - name: Generate Homebrew formula
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_PATH="$(find dist -maxdepth 1 -name "devmaid-${VERSION}-macos-*.tar.gz" | head -n 1)"
          if [[ -z "$TARBALL_PATH" ]]; then
            echo "Expected Homebrew tarball was not generated." >&2
            exit 1
          fi

          TARBALL_NAME="$(basename "$TARBALL_PATH")"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.version.outputs.tag_name }}/${TARBALL_NAME}"

          ./scripts/generate_homebrew_formula.sh \
            --version "$VERSION" \
            --url "$DOWNLOAD_URL" \
            --archive "$TARBALL_PATH" \
            --homepage "https://github.com/${GITHUB_REPOSITORY}" \
            --output "dist/devmaid.rb"

      - name: Generate Homebrew cask
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="dist/DevMaid-${VERSION}.dmg"
          if [[ ! -f "$DMG_PATH" ]]; then
            echo "Expected DMG was not generated." >&2
            exit 1
          fi

          ./scripts/generate_homebrew_cask.sh \
            --version "$VERSION" \
            --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.version.outputs.tag_name }}/$(basename "$DMG_PATH")" \
            --dmg "$DMG_PATH" \
            --homepage "https://github.com/${GITHUB_REPOSITORY}" \
            --output "dist/devmaid-app.rb"

      - name: Generate appcast
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${{ steps.version.outputs.tag_name }}"
          DMG_PATH="dist/DevMaid-${VERSION}.dmg"
          if [[ ! -f "$DMG_PATH" ]]; then
            echo "Expected DMG was not generated." >&2
            exit 1
          fi

          ./scripts/generate_appcast.sh \
            --version "$VERSION" \
            --summary "Free preview-first cleanup for developer Macs with native app + CLI, safe quarantine-first deletion, and local update checks." \
            --download-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/$(basename "$DMG_PATH")" \
            --release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}" \
            --output "dist/appcast.json"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: devmaid-${{ steps.version.outputs.version }}-artifacts
          path: |
            dist/*.tar.gz
            dist/*.dmg
            dist/*.txt
            dist/*.rb
            dist/*.json
            dist/DevMaid.app
          if-no-files-found: error

      - name: Publish GitHub release
        if: steps.version.outputs.should_publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.version.outputs.tag_name }}"

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              dist/*.tar.gz \
              dist/*.dmg \
              dist/*.txt \
              dist/*.rb \
              dist/*.json \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG_NAME" \
              dist/*.tar.gz \
              dist/*.dmg \
              dist/*.txt \
              dist/*.rb \
              dist/*.json \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --generate-notes \
              --latest
          fi

      - name: Sync Homebrew tap
        if: steps.version.outputs.should_publish == 'true' && secrets.DEVMAID_TAP_GH_TOKEN != ''
        shell: bash
        env:
          DEVMAID_TAP_GH_TOKEN: ${{ secrets.DEVMAID_TAP_GH_TOKEN }}
        run: |
          ./scripts/sync_homebrew_tap.sh \
            --version "${{ steps.version.outputs.version }}" \
            --repository "${GITHUB_REPOSITORY}" \
            --token "${DEVMAID_TAP_GH_TOKEN}" \
            --tap-repository "Earthondev/homebrew-devmaid"
