name: Bug report
description: Report a bug, regression, or incorrect cleanup behavior
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DevMaid version
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.x
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Paste the exact command you ran.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: fda
    attributes:
      label: Did Terminal or the app have Full Disk Access?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
