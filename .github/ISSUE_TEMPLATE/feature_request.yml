name: Feature request
description: Suggest a new cleanup target, workflow, or packaging improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point does this solve for developers?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Target tools or paths
      description: Example cache paths, build outputs, or developer tools involved.
  - type: textarea
    id: risk
    attributes:
      label: Safety notes
      description: Anything that should be labeled as safe, review, or danger?
