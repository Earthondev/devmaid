disabled_rules:
  - trailing_whitespace
  - void_return
  - vertical_whitespace
  - type_name
  - identifier_name
  - line_length
  - function_body_length
  - type_body_length
  - file_length

opt_in_rules:
  - empty_count
  - empty_string
  - contains_over_first_not_nil
  - force_unwrapping

force_unwrapping: error

included:
  - Sources
  - Tests

excluded:
  - .build
  - dist
